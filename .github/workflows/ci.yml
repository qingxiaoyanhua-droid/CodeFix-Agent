name: CodeFix-Agent CI

on:
  push:
    branches: [main master]
  pull_request:
    branches: [main master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --select=E,F,W,C90,N,Q,UP --ignore=E501

      - name: Run basic tests
        run: |
          python -c "
          import sys
          print('Python version:', sys.version)

          # Test cot_react_agent
          try:
              from cot_react_agent import CodeFixAgent
              print('cot_react_agent: OK')
          except ImportError as e:
              print(f'cot_react_agent: IMPORT ERROR - {e}')

          # Test enhanced_agent
          try:
              from enhanced_agent import EnhancedCodeFixAgent
              print('enhanced_agent: OK')
          except ImportError as e:
              print(f'enhanced_agent: IMPORT ERROR - {e}')

          # Test ast_code_processor
          try:
              from ast_code_processor import ASTCodeProcessor
              print('ast_code_processor: OK')
          except ImportError as e:
              print(f'ast_code_processor: IMPORT ERROR - {e}')

          # Test process_reward_model
          try:
              from process_reward_model import MultiGranularityReward
              print('process_reward_model: OK')
          except ImportError as e:
              print(f'process_reward_model: IMPORT ERROR - {e}')

          print('All core modules imported successfully')
          "

      - name: Run simple fix test
        run: |
          python -c "
          # Quick smoke test - just import and instantiate
          from cot_react_agent import CodeFixAgent
          print('CodeFixAgent class loaded successfully')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linting
        run: ruff check . --select=E,F,W,C90,N,Q,UP --ignore=E501 --output-format=text

      - name: Run ruff with JSON output
        run: ruff check . --select=E,F,W,C90,N,Q,UP --ignore=E501 --output-format=json --exit-zero || true
