# ================================================================
# CodeFix Agent — Nginx 生产级配置
# ================================================================
# 架构：
#   客户端 → Nginx (:443 SSL) → Gateway (:8000) → API Servers (:8001..N)
#
# 核心功能：
#   1. L7 负载均衡（ip_hash + least_conn）
#   2. 基础限流（单 IP 连接数 / 请求数）
#   3. SSE / WebSocket 长连接支持
#   4. SSL/TLS 终止
#   5. 静态资源缓存
#   6. Gzip 压缩
#
# 使用方式：
#   1. 将此文件复制到 /etc/nginx/nginx.conf
#   2. 根据实际 IP 修改 upstream backend 和 upstream gateway
#   3. 替换 SSL 证书路径（/etc/ssl/certs/codefix.crt / .key）
#   4. nginx -t && systemctl reload nginx
# ================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;           # Linux 高性能事件驱动
}

http {
    # ---- 基本设置 ----
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_level 4;

    # ---- 限流区域定义（ngx_http_limit_req_module）----
    # 共享内存：10MB，支撑 ~100k 桶
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=per_ip:5m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ---- 上游服务定义 ----

    # Gateway（鉴权/限流层）
    upstream gateway {
        server 127.0.0.1:8000;
        keepalive 64;
    }

    # API Server 集群（多实例水平扩展）
    upstream api_servers {
        # 权重模式：性能强的机器权重更高
        # 最多 8 个实例，超过后考虑 Kubernetes Ingress
        least_conn;   # 最少连接优先（适合长连接 SSE）

        server 127.0.0.1:8001 weight=3;
        # server 10.0.1.12:8001 weight=3;
        # server 10.0.1.13:8001 weight=3;
    }

    # ---- 主服务器块 ----
    server {
        listen 443 ssl http2;
        server_name codefix.example.com;

        # ---- SSL 终止 ----
        ssl_certificate     /etc/ssl/certs/codefix.crt;
        ssl_certificate_key /etc/ssl/private/codefix.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;

        # ---- 安全头 ----
        add_header X-Frame-Options          "SAMEORIGIN" always;
        add_header X-Content-Type-Options   "nosniff" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

        # ---- 全局限流（第一道防线）----
        limit_req zone=global_limit burst=50 nodelay;
        limit_conn addr 50;

        # ---- SSE / Streaming 连接优化 ----
        # SSE 需要长连接：关闭 proxy_buffering，让数据实时推送
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # ---- SSE Keep-Alive 超时（必须 > 客户端超时）----
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;   # SSE 最长 5 分钟
        proxy_read_timeout    300s;

        # ---- 请求体大小限制 ----
        client_max_body_size  1m;
        client_body_timeout   30s;

        # ==================== 路由规则 ====================

        location /api/ {
            # ---- IP 级别限流（第二道防线）----
            limit_req zone=per_ip burst=20 nodelay;
            limit_conn addr 20;

            # ---- 路由分发 ----
            # /api/v1/* → Gateway（鉴权 + 精细限流）
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ---- SSE 专用设置 ----
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/stream/ {
            # SSE 流式接口：更宽松的连接限制，但严格带宽控制
            limit_req zone=per_ip burst=5 nodelay;
            limit_conn addr 10;
            proxy_buffering off;
            proxy_cache off;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /health {
            # 健康检查：直接访问后端，跳过 Gateway
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        location /metrics {
            # Prometheus 指标端点
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            access_log off;
        }

        # ==================== 静态文件（前端） ====================
        location / {
            root /var/www/codefix/static;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 缓存策略
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # ==================== 错误页面 ====================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ---- HTTP → HTTPS 重定向 ----
    server {
        listen 80;
        server_name codefix.example.com;
        return 301 https://$server_name$request_uri;
    }
}
